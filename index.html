<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Alerta - Nuevo Suscriptor</title>
    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body>
    <div class="alert-wrapper">
        <!-- Decoraciones superiores -->
        <div class="center-stars_center-bottom">
            <img src="./imgs/stars_center.png" alt="Wings_Star_bottom">
        </div>
        <div class="center-Cuernos-bottom">
            <img src="./imgs/Cuernos.png" alt="Wings_Star_bottom">
        </div>
        <div class="center-wings-bottom">
            <img src="./imgs/Wings_Star_bottom.png" alt="Wings_Star_bottom">
        </div>


        <!-- Fondo de papel con el texto -->
        <div class="paper-bg">
            <div class="star-center-t">
                <img src="./imgs/Startop.png" alt="Star Icon">
            </div>
            <div class="content">
                <h1 class="title">Nuevo Suscriptor</h1>
                <div class="username">@usuario_demo</div>
            </div>
            <div class="star-center-b">
                <img src="./imgs/Startop.png" alt="Star Icon">
            </div>
        </div>
    </div>
</body>

</html>
